<!DOCTYPE html>
<html>
<head>
    <title>Crime Analysis Dashboard</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #f8f9fb;
            color: #333;
        }
        h1, h2, h3 {
            text-align: center;
        }
        h1 {
            color: #1f2c56;
            margin-bottom: 10px;
        }
        h2 {
            margin-top: 40px;
            margin-bottom: 20px;
        }
        h3 {
            margin-top: 30px;
            margin-bottom: 10px;
        }
        img, iframe {
            border-radius: 10px;
            margin-bottom: 30px;
            max-width: 100%;
        }
        .dropdown-container {
            text-align: center;
            margin-bottom: 20px;
        }
        select {
            padding: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h1>Crime Analysis Dashboard</h1>

    <h2>Crime Analysis Dashboard</h2>

    <h3>📊 Crime Trends</h3>
    <img src="focus_crime_plot.png" style="width:100%;">

    <h3>🗺️ Crime Map</h3>
    <iframe src="assault_crime_map.html" width="100%" height="500"></iframe>

        <!-- NEW SECTION -->
    <h3>⏱️ Assault Time Distribution</h3>

    <div class="dropdown-container">
        <label><b>Select Police District:</b></label>
        <select id="districtDropdown">
            <option value="bayview.html">Bayview</option>
            <option value="central.html">Central</option>
            <option value="ingleside.html">Central</option>
            <option value="mission.html">Mission</option>
            <option value="northern.html">Northern</option>
            <option value="park.html">Park</option>
            <option value="richmond.html">Richmond</option>
            <option value="southern.html">Southern</option>
            <option value="taraval.html">Taraval</option>
            <option value="tenderloin.html">Tenderloin</option>
        </select>
    </div>

    <iframe id="plotFrame"
        src="bayview.html"
        width="100%"
        height="650"
        style="border:none;">
    </iframe>

    <script>
        document.getElementById("districtDropdown").onchange = function() {
            document.getElementById("plotFrame").src = this.value;
        };
    </script>

</body>
</html>
